services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: mindpocket-postgres
    environment:
      POSTGRES_DB: mindpocket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mindpocket-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindpocket"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mindpocket-postgres-data:
